<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Patient Welcome — Omni Dental</title>

<!--
  ════════════════════════════════════════════════════════════════════════
  PATIENT WELCOME SCREEN  —  multi-tenant build
  ────────────────────────────────────────────────────────────────────────
  ONE deployment serves every practice. Each office opens its own simple URL:
       welcome.omnidentalservice.com/?office=inspire
  The office name in the URL tells the server which practice this screen is for.

  FLOW:  Roster of all of today's patients (grouped by hour)
         →  tap a patient  →  full-screen welcome  →  Back
  Plus:  "+ Add walk-in" for anyone not on the schedule.

  DATA (production): the browser NEVER sees the Kolla token. The front end
  sends the office name to your Vercel function, which holds the secrets and
  returns that office's branding + patients:
       GET /api/schedule?office=inspire
         -> look up office -> its branding + its Kolla consumer
         -> Kolla: GET /dental/v1/appointments (scoped to THAT consumer only)
         -> resolve each contact_id to contact.first_name
         -> return { branding, patients:[{id,first_name,start,provider}] }
  Branding (logo, colors, name, message) comes back from the server per office,
  so the screen themes itself from whatever office the URL names.
  The front end polls every ~45s, so reschedules + add-ons appear live.

  This demo uses mock data shaped exactly like that response. To go live,
  replace fetchSchedule() with one fetch() to /api/schedule. Nothing else
  changes.
  ════════════════════════════════════════════════════════════════════════
-->

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..600;1,9..144,400&family=Hanken+Grotesk:wght@300..700&display=swap" rel="stylesheet">

<style>
  :root{
    /* clean white + warm surfaces */
    --bg:#fdfbf7;  --bg-2:#f4eee3;  --surface:#ffffff;  --surface-2:#faf5ec;
    --ink:#2f2722;  --muted:#8c8174;
    /* kept for the welcome takeover (already light) + as muted alias */
    --cream:#f6f0e4;  --cream-dim:#8c8174;  --slate-700:#3a322b;  --slate-800:#ffffff;  --slate-900:#faf5ec;
    --line:rgba(60,45,30,.10);  --line-strong:rgba(60,45,30,.18);
    /* --accent* are set per-practice at runtime */
    --accent:#e0a64f;  --accent-deep:#c98a32;  --accent-soft:#f0c987;
    --display:"Fraunces",Georgia,serif;
    --body:"Hanken Grotesk",system-ui,sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{font-family:var(--body);background:var(--bg);color:var(--ink);overflow:hidden;-webkit-font-smoothing:antialiased}

  .atmos{position:fixed;inset:0;pointer-events:none;z-index:0}
  .atmos::before{content:"";position:absolute;inset:0;
    background:
      radial-gradient(1100px 720px at 16% 10%, color-mix(in srgb,var(--accent) 15%, transparent), transparent 60%),
      radial-gradient(940px 640px at 90% 98%, color-mix(in srgb,var(--accent-soft) 26%, transparent), transparent 58%),
      linear-gradient(165deg,#fffdf9,var(--bg) 46%,var(--bg-2));}
  .atmos::after{content:"";position:absolute;inset:0;opacity:.04;mix-blend-mode:multiply;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='120' height='120'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");}

  /* ─────────── HOME / ROSTER ─────────── */
  .home{position:relative;z-index:1;height:100%;display:flex;flex-direction:column}
  .top{display:flex;justify-content:space-between;align-items:flex-start;padding:34px 46px 0}
  .brand{display:flex;align-items:center;gap:16px}
  .mono{width:48px;height:48px;border-radius:13px;display:grid;place-items:center;
    border:1px solid var(--line);background:var(--surface);font-family:var(--display);font-size:24px;color:var(--accent-deep);
    box-shadow:0 6px 20px color-mix(in srgb,var(--accent) 18%, transparent)}
  .brand .txt .name{font-family:var(--display);font-size:24px;font-weight:500}
  .brand .txt .sub{font-size:11px;letter-spacing:.3em;text-transform:uppercase;color:var(--cream-dim);margin-top:1px}
  .meta-r{text-align:right}
  .meta-r .room{font-family:var(--display);font-size:20px;color:var(--accent-deep)}
  .meta-r .clock{font-size:13px;color:var(--cream-dim);font-variant-numeric:tabular-nums;margin-top:2px}

  .roster-head{padding:30px 46px 14px;display:flex;align-items:baseline;gap:14px}
  .roster-head h1{font-family:var(--display);font-weight:300;font-size:30px}
  .roster-head .count{font-size:13px;color:var(--cream-dim);letter-spacing:.04em}

  .roster{flex:1;overflow-y:auto;padding:4px 46px 40px;
    display:flex;flex-direction:column;gap:24px;align-content:start}
  .hour-group{display:flex;flex-direction:column;gap:13px}
  .hour-label{display:flex;align-items:center;gap:14px;font-size:13px;letter-spacing:.2em;
    text-transform:uppercase;color:var(--cream-dim)}
  .hour-label .hr{font-family:var(--display);font-size:19px;letter-spacing:0;text-transform:none;color:var(--accent-deep)}
  .hour-label .line{flex:1;height:1px;background:var(--line)}
  .hour-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px}
  .card{
    text-align:left;background:var(--surface);border:1px solid var(--line);
    border-radius:16px;padding:22px 22px 20px;cursor:pointer;transition:.18s;
    display:flex;flex-direction:column;gap:6px;min-height:128px;position:relative;
    font-family:var(--body);color:var(--ink);
    box-shadow:0 1px 2px rgba(60,45,30,.04),0 12px 26px rgba(60,45,30,.05);
  }
  .card:hover{transform:translateY(-3px);border-color:color-mix(in srgb,var(--accent) 55%, transparent);
    background:color-mix(in srgb,var(--accent) 6%, var(--surface));
    box-shadow:0 8px 18px color-mix(in srgb,var(--accent) 16%, transparent),0 16px 32px rgba(60,45,30,.08)}
  .card .nm{font-family:var(--display);font-size:30px;font-weight:500;line-height:1.05;color:var(--ink)}
  .card .meta{font-size:13px;color:var(--muted);font-variant-numeric:tabular-nums}
  .card .badge{position:absolute;top:16px;right:16px;font-size:10px;letter-spacing:.18em;
    text-transform:uppercase;padding:4px 9px;border-radius:20px;border:1px solid var(--line);color:var(--muted);background:var(--surface-2)}
  .card .badge.now{color:var(--accent-deep);border-color:color-mix(in srgb,var(--accent) 45%, transparent);
    background:color-mix(in srgb,var(--accent) 14%, var(--surface))}
  .card .cta{margin-top:auto;font-size:12px;letter-spacing:.05em;color:var(--accent-deep);opacity:0;transition:.18s}
  .card:hover .cta{opacity:1}

  .card.add{align-items:center;justify-content:center;text-align:center;border-style:dashed;
    border-color:color-mix(in srgb,var(--accent) 45%, transparent);background:transparent;gap:4px;box-shadow:none}
  .card.add:hover{background:color-mix(in srgb,var(--accent) 7%, transparent);box-shadow:none}
  .card.add .plus{font-family:var(--display);font-size:34px;color:var(--accent-deep);line-height:1}
  .card.add .lbl{font-size:14px;font-weight:600;color:var(--ink)}
  .card.empty{cursor:default;align-items:center;justify-content:center;color:var(--muted);font-style:italic;border-style:dashed;box-shadow:none}
  .card.empty:hover{transform:none;border-color:var(--line);background:var(--surface)}

  /* demo-only switcher strip */
  .demo{z-index:2;border-top:1px solid var(--line);background:rgba(8,16,28,.7);backdrop-filter:blur(10px);
    padding:11px 46px;display:flex;align-items:center;gap:18px;font-size:12px;color:var(--cream-dim)}
  .demo .tag{font-size:10px;letter-spacing:.26em;text-transform:uppercase}
  .demo select{font-family:var(--body);font-size:13px;background:var(--slate-800);color:var(--cream);
    border:1px solid var(--line);border-radius:8px;padding:6px 10px;cursor:pointer}
  .demo .note{margin-left:auto;max-width:300px;line-height:1.4;text-align:right}
  .demo .url{font-family:var(--mono,ui-monospace,monospace);font-size:12px;color:var(--accent-soft);
    background:rgba(255,255,255,.05);border:1px solid var(--line);border-radius:7px;padding:5px 9px}

  /* ─────────── ADD WALK-IN MODAL ─────────── */
  .modal-wrap{position:fixed;inset:0;z-index:40;display:none;place-items:center;
    background:rgba(47,39,34,.32);backdrop-filter:blur(4px)}
  .modal-wrap.show{display:grid}
  .modal{width:min(440px,92vw);background:var(--surface);border:1px solid var(--line);
    border-radius:18px;padding:28px 28px 24px;box-shadow:0 30px 80px rgba(60,45,30,.22)}
  .modal h2{font-family:var(--display);font-weight:500;font-size:24px;margin-bottom:4px;color:var(--ink)}
  .modal p{font-size:13px;color:var(--muted);margin-bottom:18px}
  .modal label{display:block;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);margin:14px 0 6px}
  .modal input{width:100%;font-family:var(--body);font-size:16px;color:var(--ink);
    background:var(--surface-2);border:1px solid var(--line-strong);border-radius:10px;padding:13px 14px;outline:none}
  .modal input:focus{border-color:var(--accent-deep)}
  .modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:22px}

  .btn{font-family:var(--body);font-weight:600;font-size:14px;border:none;border-radius:10px;cursor:pointer;
    padding:12px 20px;transition:transform .15s,filter .2s}
  .btn:active{transform:translateY(1px)}
  .btn-accent{background:linear-gradient(180deg,var(--accent),var(--accent-deep));color:#231605}
  .btn-accent:hover{filter:brightness(1.06)}
  .btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--line-strong)}
  .btn-ghost:hover{color:var(--ink);border-color:var(--accent-deep)}

  /* ─────────── WELCOME TAKEOVER ─────────── */
  .welcome{position:fixed;inset:0;z-index:50;display:none;flex-direction:column;
    justify-content:center;align-items:center;text-align:center;color:var(--ink);overflow:hidden;
    background:radial-gradient(1200px 800px at 50% 35%, #fbf6ec, var(--cream) 70%)}
  .welcome.show{display:flex}
  .welcome .grain{position:absolute;inset:0;opacity:.05;mix-blend-mode:multiply;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='120' height='120'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>")}
  .welcome .practice{font-size:12px;letter-spacing:.38em;text-transform:uppercase;color:var(--accent-deep);opacity:0}
  .welcome .greet{font-family:var(--display);font-weight:300;font-size:clamp(41px,6vw,77px);color:var(--slate-700);margin-top:18px;opacity:0}
  .welcome .first{font-family:var(--display);font-weight:500;font-size:clamp(77px,15.6vw,202px);line-height:.95;
    color:var(--ink);margin-top:4px;opacity:0;letter-spacing:-.01em;cursor:text;border-radius:14px;padding:0 .12em;transition:background .2s}
  .welcome .first:hover{background:color-mix(in srgb,var(--accent) 16%, transparent)}
  .welcome .rule{height:2px;width:0;background:var(--accent);margin:26px auto 0;border-radius:2px;
    transition:width .9s cubic-bezier(.2,.7,.2,1) .55s}
  .welcome .tag{font-size:clamp(15px,1.6vw,19px);color:#5b6577;margin-top:24px;opacity:0;max-width:30ch;line-height:1.55}
  .welcome .mline{font-size:13px;letter-spacing:.06em;color:#8a93a3;margin-top:10px;opacity:0}
  .welcome.show .practice{animation:rise .7s ease forwards .05s}
  .welcome.show .greet{animation:rise .7s ease forwards .2s}
  .welcome.show .first{animation:rise .9s cubic-bezier(.2,.8,.2,1) forwards .34s}
  .welcome.show .rule{width:120px}
  .welcome.show .tag{animation:rise .7s ease forwards .8s}
  .welcome.show .mline{animation:rise .7s ease forwards .95s}
  @keyframes rise{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:none}}

  .w-controls{position:absolute;left:0;right:0;bottom:0;z-index:5;display:flex;
    justify-content:space-between;align-items:center;gap:16px;padding:22px 30px;opacity:0;animation:rise .6s ease forwards 1.1s}
  .w-edit-area{display:flex;align-items:center;gap:10px}
  .ctrl-btn{font-family:var(--body);font-size:13px;font-weight:600;cursor:pointer;background:transparent;
    border:1px solid rgba(22,36,58,.22);color:#5b6577;border-radius:9px;padding:10px 16px;transition:.18s}
  .ctrl-btn:hover{border-color:var(--accent-deep);color:var(--ink)}
  .ctrl-btn.solid{background:var(--ink);color:var(--cream);border-color:var(--ink)}
  .ctrl-btn.solid:hover{filter:brightness(1.15);color:var(--cream)}
  .ctrl-btn.back{background:rgba(22,36,58,.06)}
  #w-edit.hide{display:none}
  .w-editfield{display:none;align-items:center;gap:8px}
  .w-editfield.show{display:flex}
  .w-editfield input{font-family:var(--body);font-size:14px;color:var(--ink);background:#fff;
    border:1px solid rgba(22,36,58,.2);border-radius:9px;padding:9px 13px;width:180px;outline:none}
  .w-editfield input:focus{border-color:var(--accent-deep)}
</style>
</head>
<body>
<div class="atmos"></div>

<!-- HOME / ROSTER -->
<div class="home">
  <div class="top">
    <div class="brand">
      <div class="mono" id="mono">I</div>
      <div class="txt">
        <div class="name" id="p-name">Inspire Dental</div>
        <div class="sub" id="p-sub">Tigard, Oregon</div>
      </div>
    </div>
    <div class="meta-r">
      <div class="room" id="today">—</div>
      <div class="clock" id="clock">—</div>
    </div>
  </div>

  <div class="roster-head">
    <h1>Arriving today</h1>
    <span class="count" id="count"></span>
  </div>
  <div class="roster" id="roster"></div>
</div>

<!-- ADD WALK-IN -->
<div class="modal-wrap" id="modal">
  <div class="modal">
    <h2>Welcome a walk-in</h2>
    <p>For a patient who isn't on today's schedule.</p>
    <label>First name</label>
    <input type="text" id="m-name" autocomplete="off" placeholder="e.g. Maria">
    <label>Provider <span style="text-transform:none;letter-spacing:0">(optional)</span></label>
    <input type="text" id="m-prov" autocomplete="off" placeholder="e.g. Dr. Choi" list="prov-list">
    <datalist id="prov-list"></datalist>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="m-cancel">Cancel</button>
      <button class="btn btn-accent" id="m-go">Welcome →</button>
    </div>
  </div>
</div>

<!-- WELCOME TAKEOVER -->
<div class="welcome" id="welcome">
  <div class="grain"></div>
  <div class="practice" id="w-practice">Inspire Dental</div>
  <div class="greet">Welcome,</div>
  <div class="first" id="w-first">Sarah</div>
  <div class="rule"></div>
  <div class="tag" id="w-tag">We're so glad you're here. Relax — you're in good hands.</div>
  <div class="mline" id="w-mline">Dr. Choi</div>
  <div class="w-controls">
    <div class="w-edit-area">
      <button class="ctrl-btn" id="w-edit">✎ Edit name</button>
      <div class="w-editfield" id="w-editfield">
        <input type="text" id="w-input" autocomplete="off" spellcheck="false" placeholder="First name">
        <button class="ctrl-btn solid" id="w-update">Update</button>
        <button class="ctrl-btn" id="w-cancel">Cancel</button>
      </div>
    </div>
    <button class="ctrl-btn back" id="w-back">← Back to roster</button>
  </div>
</div>

<script>
/* ============================================================
   Production front end. The office is taken from the URL PATH
   (/inspire, /winder, ...). The server returns that office's
   branding + patients; the browser never names secrets.
   ============================================================ */

// Office slug from the path: "/inspire" -> "inspire". Falls back to ?office=.
const OFFICE = (location.pathname.replace(/^\/+|\/+$/g, "").split("/")[0]
              || new URLSearchParams(location.search).get("office")
              || "").toLowerCase();

let roster = [];
let OFFICE_TZ = null;   // IANA tz from the server; renders times in office-local zone

/* Pull this office's schedule + branding from our own API.
   Secrets (Kolla key) live in Vercel env vars, used only server-side. */
async function fetchSchedule(office){
  try{
    const r = await fetch('/api/schedule?office=' + encodeURIComponent(office));
    if(!r.ok) return [];                          // unknown office / error -> empty
    const data = await r.json();
    if(data.timezone) OFFICE_TZ = data.timezone;  // render times in the office's zone
    if(data.branding) applyTheme(data.branding);  // theme comes from the server
    populateProviders(data.providers);            // configurable doctor suggestions
    return (data.patients || []).map(a => ({...a, start:new Date(a.start)}));
  }catch(e){ return []; }
}

/* ============================================================ */
const $ = s => document.querySelector(s);
const tzOpt = extra => OFFICE_TZ ? {...extra, timeZone:OFFICE_TZ} : extra;
const fmt = d => d.toLocaleTimeString([], tzOpt({hour:"numeric", minute:"2-digit"}));
// Hour-of-day in the office's timezone (for grouping the roster correctly).
const hourOf = d => OFFICE_TZ
  ? Number(d.toLocaleString("en-US", {hour:"2-digit", hour12:false, timeZone:OFFICE_TZ}).replace(/[^0-9]/g,"")) % 24
  : d.getHours();

function applyTheme(p){
  const r = document.documentElement.style;
  r.setProperty("--accent", p.accent);
  r.setProperty("--accent-deep", p.accentDeep);
  r.setProperty("--accent-soft", p.accentSoft);
  // logo image if configured, else monogram letter
  $("#mono").innerHTML = p.logo
    ? `<img src="${p.logo}" alt="${p.name||''}" style="width:30px;height:30px;object-fit:contain">`
    : (p.mono || (p.name||"?").trim()[0] || "?");
  $("#p-name").textContent = p.name;
  $("#p-sub").textContent = p.sub;
  $("#w-practice").textContent = p.name;
  $("#w-tag").textContent = p.welcomeMsg || "We're so glad you're here.";
}
// Fill the walk-in provider suggestions from the office's configured doctors.
function populateProviders(list){
  const dl = $("#prov-list"); if(!dl) return;
  dl.innerHTML = (list || []).map(name => `<option value="${name}"></option>`).join("");
}
function isNow(a){ const n=Date.now(); return a.start.getTime()>n-20*60000 && a.start.getTime()<n+30*60000; }
function hourLabel(h){ const ap=h<12?"AM":"PM"; let hr=h%12; if(hr===0)hr=12; return `${hr} ${ap}`; }

function makeCard(a){
  const c=document.createElement("button"); c.className="card";
  c.innerHTML = `
    <div class="badge ${isNow(a)?'now':''}">${isNow(a)?'Now':fmt(a.start)}</div>
    <div class="nm">${a.first_name}</div>
    <div class="meta">${fmt(a.start)} · ${a.provider}</div>
    <div class="cta">Tap to welcome →</div>`;
  c.onclick = () => showWelcome(a.first_name, a.provider);
  return c;
}

function renderHome(){
  const wrap = $("#roster"); wrap.innerHTML="";
  const sorted = roster.slice().sort((a,b)=>a.start-b.start);
  $("#count").textContent = sorted.length ? `${sorted.length} patients today` : "";

  if(!sorted.length){
    const e=document.createElement("div"); e.className="card empty";
    e.textContent="No appointments scheduled today"; wrap.appendChild(e);
  }

  // group by hour (in the office's timezone), in chronological order
  const groups = new Map();
  sorted.forEach(a=>{ const h=hourOf(a.start); if(!groups.has(h)) groups.set(h,[]); groups.get(h).push(a); });

  groups.forEach((list, h)=>{
    const sec=document.createElement("div"); sec.className="hour-group";
    const lbl=document.createElement("div"); lbl.className="hour-label";
    lbl.innerHTML = `<span class="hr">${hourLabel(h)}</span><span class="line"></span><span>${list.length}</span>`;
    sec.appendChild(lbl);
    const grid=document.createElement("div"); grid.className="hour-grid";
    list.forEach(a=> grid.appendChild(makeCard(a)));
    sec.appendChild(grid);
    wrap.appendChild(sec);
  });

  // trailing walk-in action
  const addSec=document.createElement("div"); addSec.className="hour-group";
  const addGrid=document.createElement("div"); addGrid.className="hour-grid";
  const add=document.createElement("button"); add.className="card add";
  add.innerHTML = `<div class="plus">+</div><div class="lbl">Add walk-in</div>`;
  add.onclick = openModal;
  addGrid.appendChild(add); addSec.appendChild(addGrid); wrap.appendChild(addSec);
}

/* ---- welcome takeover ---- */
function showWelcome(name, provider){
  $("#w-first").textContent = name;
  $("#w-mline").textContent = provider || "";
  closeEdit();
  const w=$("#welcome"); w.classList.remove("show"); void w.offsetWidth; w.classList.add("show");
  // stays up until "Back to roster" — no auto-dismiss
}
function backToRoster(){ $("#welcome").classList.remove("show"); closeEdit(); }

/* ---- inline name edit ---- */
function openEdit(){ $("#w-input").value=$("#w-first").textContent; $("#w-editfield").classList.add("show");
  $("#w-edit").classList.add("hide"); $("#w-input").focus(); $("#w-input").select(); }
function closeEdit(){ $("#w-editfield").classList.remove("show"); $("#w-edit").classList.remove("hide"); }
function applyEdit(){ const v=$("#w-input").value.trim(); if(v) $("#w-first").textContent=v; closeEdit(); }

/* ---- add walk-in modal ---- */
function openModal(){ $("#m-name").value=""; $("#m-prov").value=""; $("#modal").classList.add("show"); $("#m-name").focus(); }
function closeModal(){ $("#modal").classList.remove("show"); }
function goWalkIn(){ const n=$("#m-name").value.trim(); if(!n) return; const pr=$("#m-prov").value.trim();
  closeModal(); showWelcome(n, pr || ""); }

/* ---- bindings ---- */
$("#w-edit").onclick=openEdit; $("#w-first").onclick=openEdit;
$("#w-update").onclick=applyEdit; $("#w-cancel").onclick=closeEdit;
$("#w-input").addEventListener("keydown",e=>{ if(e.key==="Enter")applyEdit(); if(e.key==="Escape")closeEdit(); });
$("#w-back").onclick=backToRoster;
$("#m-cancel").onclick=closeModal; $("#m-go").onclick=goWalkIn;
$("#m-name").addEventListener("keydown",e=>{ if(e.key==="Enter")goWalkIn(); if(e.key==="Escape")closeModal(); });
$("#modal").addEventListener("click",e=>{ if(e.target===$("#modal")) closeModal(); });

/* clock + date + boot + live polling */
function tick(){ const now=new Date();
  $("#clock").textContent=now.toLocaleTimeString([], tzOpt({hour:"numeric",minute:"2-digit"}));
  $("#today").textContent=now.toLocaleDateString([], tzOpt({weekday:"short", month:"short", day:"numeric"})); }
async function load(){ roster = await fetchSchedule(OFFICE); renderHome(); }

// neutral first paint; real branding arrives from the server on first load()
applyTheme({ name:"", sub:"", logo:null, mono:" ",
  accent:"#e0a64f", accentDeep:"#c98a32", accentSoft:"#f0c987",
  welcomeMsg:"We're so glad you're here." });
tick(); setInterval(tick,15000);
load();
// re-poll /api/schedule so reschedules/add-ons appear live
setInterval(()=>{ if(!$("#welcome").classList.contains("show") && !$("#modal").classList.contains("show")) load(); }, 45000);
</script>
</body>
</html>
